# Matugen
include $HOME/.config/kitty/themes/matugen.conf

# FONTS
font_family                 Hack Nerd Font
bold_font                   auto
italic_font                 auto
bold_italic_font            auto
font_size                   11.0

# CURSORS
cursor_shape                beam
cursor_trail                1
cursor_blink_interval       0.5

# WINDOWS
window_padding_width        10
background_opacity          0.95
confirm_os_window_close     0
scrollbar                   never

# SHELL
shell                       fish