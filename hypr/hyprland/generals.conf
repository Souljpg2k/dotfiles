general {
    gaps_in = 4
    gaps_out = 8
    border_size = 0
    col.active_border = rgba(212223aa)
    col.inactive_border = rgba(595959aa)
    resize_on_border = false
    allow_tearing = false
    layout = dwindle
}

decoration {
    rounding = 18
    rounding_power = 3
    active_opacity = 1.0
    inactive_opacity = 1.0

    shadow {
        enabled = true
        range = 3
        render_power = 4
        color = rgba(1a1a1aee)
    }

    blur {
        enabled = true
        size = 8
        passes = 3
        vibrancy = 0.1696
    }
}

dwindle {
    pseudotile = true 
    preserve_split = true
}

master {
    new_status = master
}

misc {
    force_default_wallpaper = -1 
    disable_hyprland_logo = true
}